<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5 tutorial</title>

    <!-- Fonts should be loaded first -->
    <link href="https://fonts.googleapis.com/css2?family=Jacquard+12:wght@400&display=swap" rel="stylesheet">
    
    <!-- Load P5.js Libraries first -->
    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
    
    <!-- Load SceneManager after P5.js -->
    <script src="libraries/scenemanager.js"></script>
    
    <!-- Load scene classes before main sketch -->
    <script src="scenes/welcomeScene.js"></script>
    <script src="scenes/journeyScene.js"></script>
    <script src="scenes/lastScene.js"></script>
    
    <!-- Load main sketch last -->
    <script src="sketch.js"></script>


    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        .control {
            position: fixed;
            bottom: 20px;
            left: 10%;
            transform: translateX(-50%);
            background: hsla(0, 0%, 100%, 0);
            padding: 10px 2px;
            border-radius: 5px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }
        
        .control__play {
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            padding: 5px 15px;
            border-radius: 3px;
            transition: background 0.3s;
        }
        
        .control__play:hover {
            background: #ffffff1a;
        }
      
        /* Add new styles for poetry sections */
        .poetry-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Add smooth scrolling for the whole page */
        html {
            scroll-behavior: smooth;
        }
        
        .none {
            display: none;
        }
        
        .fadeout {
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .fadeIn {
            opacity: 1;
            transition: opacity 0.5s;
        }
      
        /* Add media queries for responsive layout */
        @media (max-width: 768px) {
            .control {
                left: 50%; /* Center controls on mobile */
            }
        }
    </style>
</head>
<body>
    <div class="poetry-container"></div>
    
    <div class="control none">
        <div class="control__name">Life of Pi.mp3 - A.jhaveri</div>
        <button class="control__play">▶</button>
    </div>
    
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const control = document.querySelector('.control');
        const playButton = document.querySelector('.control__play');
        let isPlaying = false;

        // Audio control handling using our global mgr variable
        playButton.addEventListener('click', function() {
            // Access the scene manager through our global mgr variable
            if (!window.mgr) return;
            
            const currentScene = window.mgr.getCurrentScene();
            if (currentScene && currentScene.song) {
                if (isPlaying) {
                    currentScene.song.pause();
                    playButton.textContent = '▶';
                } else {
                    currentScene.song.play();
                    playButton.textContent = '⏸';
                }
                isPlaying = !isPlaying;
            }
        });

        // Control visibility handling
        let timeout;
        document.addEventListener('mousemove', function() {
            if (!window.mgr) return;
            
            const currentSceneName = window.mgr.getCurrentSceneName();
            if (currentSceneName === 'JOURNEY') {
                control.classList.remove('fadeout', 'none');
                control.classList.add('fadeIn');
                
                clearTimeout(timeout);
                timeout = setTimeout(function() {
                    control.classList.add('none');
                }, 3000);
            } else {
                control.classList.add('none');
            }
        });
    });
    </script>
</body>
</html>
